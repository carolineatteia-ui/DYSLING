<html lang="fr">

<meta charset="UTF-8"/>

<meta name="description" content="DysLing — L'anglais en sons français. Outil pédagogique pour lecteurs dyslexiques francophones."/>

<title>DysLing — L'anglais en sons français</title>
<!-- ✅ ZÉRO dépendance externe. Fonctionne 100% hors ligne. -->
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;min-height:100vh}
textarea,input,select{font-family:inherit}
textarea:focus,input:focus,select:focus{outline:2px solid #C9793B44}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-thumb{background:#C9793B55;border-radius:3px}
button{font-family:inherit;cursor:pointer}

/* Layout */
#app{min-height:100vh;padding-bottom:60px}
.header{border-bottom:3px solid var(--accent-light);padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.header-logo{display:flex;align-items:center;gap:14px}
.header-logo h1{font-size:26px;font-weight:700;letter-spacing:-0.02em;color:var(--accent)}
.header-logo p{font-size:10px;letter-spacing:0.1em;color:var(--text-muted)}
.header-right{display:flex;gap:10px;align-items:center}
.theme-dot{width:20px;height:20px;border-radius:50%;cursor:pointer}

/* Tabs */
.tabs{display:flex;gap:3px;padding:0 22px;border-bottom:2px solid var(--accent-light);margin-top:8px;flex-wrap:wrap}
.tab-btn{padding:10px 14px;border-radius:10px 10px 0 0;border:none;cursor:pointer;font-weight:400;background:transparent;color:var(--text-muted);font-size:13px;transition:all .2s;font-family:Georgia,serif}
.tab-btn.active{font-weight:700;background:var(--paper);color:var(--accent)}

/* Content */
.content{max-width:1200px;margin:0 auto;padding:22px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.panel{background:var(--paper);border-radius:16px;padding:22px;border:1px solid var(--accent-light)}
.panel-accent{border:2px solid var(--accent-light)}
.label{font-size:11px;font-weight:700;letter-spacing:.12em;color:var(--accent);display:block;margin-bottom:6px}

/* Buttons */
.btn-primary{padding:11px 26px;border-radius:50px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px var(--accent-shadow);font-family:Georgia,serif;transition:opacity .2s}
.btn-primary:disabled{opacity:.5;cursor:default}
.btn-secondary{padding:9px 20px;border-radius:50px;border:2px solid var(--accent);background:transparent;color:var(--accent);font-size:13px;font-weight:600;cursor:pointer;font-family:Georgia,serif}
.btn-ghost{padding:7px 14px;border-radius:20px;border:1px solid var(--accent-light);background:transparent;color:var(--accent);font-size:12px;cursor:pointer;font-family:Georgia,serif}
.btn-learn{padding:11px 26px;border-radius:50px;border:none;background:linear-gradient(135deg,#27ae60,#2ecc71);color:#fff;font-size:14px;font-weight:700;cursor:pointer;box-shadow:0 4px 14px #27ae6044;font-family:Georgia,serif}
.btn-danger{padding:7px 14px;border-radius:20px;border:1px solid #e74c3c55;background:transparent;color:#e74c3c;font-size:12px;cursor:pointer;font-family:Georgia,serif}

/* Inputs */
.inp{padding:8px 12px;border-radius:8px;border:1.5px solid var(--accent-light);background:var(--bg);color:var(--text);font-size:14px;font-family:Georgia,serif}
.textarea{width:100%;padding:16px;background:var(--paper);color:var(--text);border:1.5px solid var(--accent-light);border-radius:12px;resize:vertical;outline:none;font-family:Georgia,serif}

/* Word chips */
.word-chip{display:inline-flex;align-items:center;gap:5px;padding:6px 10px;border-radius:10px;font-size:13px;cursor:pointer;transition:all .15s;margin:3px;position:relative;border:2px solid transparent}
.word-chip:hover{transform:translateY(-1px)}
.word-chip-ok{background:var(--accent-light);border-color:var(--accent-light);color:var(--accent);cursor:default}
.chip-popup{position:absolute;top:calc(100% + 4px);left:0;z-index:200;background:var(--paper);border-radius:12px;padding:14px;border:2px solid var(--accent-light);box-shadow:0 8px 24px #0002;min-width:240px;max-width:300px;animation:popIn .2s ease}

/* Confidence dots */
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;vertical-align:middle}

/* Modals */
.modal-overlay{position:fixed;inset:0;background:#0009;z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--paper);border-radius:20px;padding:32px;max-width:560px;width:100%;border:2px solid var(--accent-light);box-shadow:0 20px 60px #0006}

/* Misc */
.badge-learn{background:linear-gradient(135deg,#27ae60,#2ecc71);color:white;font-size:9px;font-weight:800;letter-spacing:.08em;padding:2px 6px;border-radius:6px;text-transform:uppercase;margin-left:6px;vertical-align:middle}
.encouragement{padding:12px 16px;border-radius:12px;border:2px solid var(--accent-light);background:var(--accent-light)}
.fade-in{animation:fadeIn .3s ease forwards}
.spinner{display:inline-block;width:36px;height:36px;border:4px solid var(--accent-light);border-top:4px solid var(--accent);border-radius:50%;animation:spin 1s linear infinite}

/* Learn validation */
.learn-item{padding:10px 14px;border-radius:10px;cursor:pointer;border:2px solid #27ae6033;transition:all .15s;display:flex;align-items:center;gap:8px}
.learn-item.selected{border-color:#27ae60;background:#27ae6012}

/* Range */
input[type=range]{width:100%;accent-color:var(--accent)}

/* RGPD box */
.rgpd-card{padding:16px;border-radius:12px;border:1px solid var(--accent-light);background:var(--accent-bg)}

/* Journal */
.log-chip{padding:4px 10px;border-radius:8px;font-size:12px;background:var(--accent-light);border:1px solid var(--accent-light);display:inline-flex;gap:6px;align-items:center;margin:3px}

/* Warn banner */
.warn-banner{padding:10px 14px;border-radius:10px;border:1.5px solid #e67e2244;background:#e67e2210;font-size:13px;color:#c0392b;margin-top:10px;line-height:1.6}

/* Mode selector */
.mode-btn{padding:7px 16px;border-radius:20px;border:2px solid var(--accent-light);background:transparent;color:var(--text-muted);font-size:12px;font-weight:400;transition:all .2s;font-family:Georgia,serif;cursor:pointer}
.mode-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent);font-weight:700}

/* Checklist */
.check-row{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:14px;color:var(--text)}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes popIn{from{opacity:0;transform:scale(.9)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}

/* Responsive */
@media(max-width:700px){
  .grid-2{grid-template-columns:1fr}
  .tabs{padding:0 8px}
  .content{padding:12px}
}

// ── MOTEUR PHONÉTIQUE ────────────────────────────────────────
function getMergedDict(){
  const d = {};
  Object.assign(d, WORD_DICT);
  Object.entries(S.userDict).forEach(([k,v])=>{ d[k.toLowerCase()]=v; });
  return d;
}

function transformWord(word, rules, dict){
  const lower = word.toLowerCase();
  const isCap = /^[A-Z]/.test(word);
  const isAll = word===word.toUpperCase()&&word.length>1;
  if(dict[lower]){
    const r=dict[lower];
    if(isAll) return r.toUpperCase();
    if(isCap) return r[0].toUpperCase()+r.slice(1);
    return r;
  }
  const n=lower.length;
  const spans=new Array(n).fill(null);
  const covered=new Array(n).fill(false);
  for(const rule of rules){
    if(!rule.active) continue;
    const pat=rule.grapheme.toLowerCase(); const pl=pat.length;
    if(!pl) continue;
    let i=0;
    while(i<=n-pl){
      if(lower.slice(i,i+pl)===pat){
        let free=true;
        for(let k=i;k<i+pl;k++) if(covered[k]){free=false;break;}
        if(free){spans[i]={out:rule.phoneme,len:pl};for(let k=i;k<i+pl;k++) covered[k]=true;i+=pl;continue;}
      }
      i++;
    }
  }
  let result="";let i=0;
  while(i<n){
    if(spans[i]){result+=spans[i].out;i+=spans[i].len;}
    else if(!covered[i]){result+=lower[i];i++;}
    else i++;
  }
  result=result.replace(/([bcdfghjklmnpqrstvwxyz])e$/i,"$1");
  if(isAll) return result.toUpperCase();
  if(isCap) return result[0].toUpperCase()+result.slice(1);
  return result;
}

function applyMap(text,rules,dict){
  return text.split(/(\s+)/).map(seg=>{
    if(/^\s+$/.test(seg)) return seg;
    const m=seg.match(/^([^a-zA-Z]*)([a-zA-Z''-]+)([^a-zA-Z]*)$/);
    if(!m) return seg;
    return m[1]+transformWord(m[2],rules,dict)+m[3];
  }).join("");
}

// ── MOTEUR INVERSE ────────────────────────────────────────────
function levenshtein(a,b){
  const m=a.length,n=b.length;
  const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>j===0?i:0));
  for(let j=1;j<=n;j++) dp[0][j]=j;
  for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
    dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
  return dp[m][n];
}

function buildReverseDict(dict,rules){
  const rev={};
  Object.entries(dict).forEach(([en,fr])=>{
    const k=fr.toLowerCase().trim();
    if(!rev[k]) rev[k]=[];
    if(!rev[k].includes(en)) rev[k].push(en);
  });
  return rev;
}

function reversePhonetics(word,rules){
  const active=rules.filter(r=>r.active&&r.phoneme);
  function gen(text,ri,variants){
    variants.add(text);
    if(ri>=active.length) return;
    const r=active[ri];
    const ph=r.phoneme.toLowerCase(),gr=r.grapheme.toLowerCase();
    if(text.includes(ph)) gen(text.split(ph).join(gr),ri+1,variants);
    gen(text,ri+1,variants);
  }
  const v=new Set();
  gen(word.toLowerCase(),0,v);
  return [...v];
}

function correctWord(phonWord,dict,rules){
  const lower=phonWord.toLowerCase().trim();
  if(!lower||lower.length<2) return{original:phonWord,correct:phonWord,suggestions:[],wasOk:true,confidence:1,method:"ok"};
  const rev=buildReverseDict(dict,rules);
  // 1. Correspondance exacte
  if(rev[lower]) return{original:phonWord,correct:rev[lower][0],suggestions:rev[lower].slice(0,4),wasOk:false,confidence:1,method:"dict"};
  // 2. Règles inverses
  const variants=reversePhonetics(lower,rules);
  const found=[];
  variants.forEach(v=>{
    if(dict[v]&&!found.includes(v)) found.push(v);
    if(rev[v]) rev[v].forEach(w=>{if(!found.includes(w)) found.push(w);});
  });
  if(found.length>0) return{original:phonWord,correct:found[0],suggestions:found.slice(0,4),wasOk:false,confidence:.85,method:"rules"};
  // 3. Fuzzy
  const scored=[];
  Object.entries(dict).forEach(([en,fr])=>{
    const fl=fr.toLowerCase();
    const dist=levenshtein(lower,fl);
    const sim=1-dist/Math.max(lower.length,fl.length);
    if(sim>0.55) scored.push({en,sim});
  });
  scored.sort((a,b)=>b.sim-a.sim);
  if(scored.length>0) return{original:phonWord,correct:scored[0].en,suggestions:scored.slice(0,4).map(s=>s.en),wasOk:false,confidence:scored[0].sim,method:"fuzzy"};
  return{original:phonWord,correct:phonWord,suggestions:[],wasOk:true,confidence:1,method:"unknown"};
}

function correctText(text,dict,rules){
  const words=text.split(/(\s+)/);
  const corrections=[];
  let correctedText="";
  words.forEach(seg=>{
    if(/^\s+$/.test(seg)){correctedText+=seg;return;}
    const m=seg.match(/^([^a-zA-ZÀ-ÿ]*)([a-zA-ZÀ-ÿ''-]+)([^a-zA-ZÀ-ÿ]*)$/);
    if(!m){correctedText+=seg;return;}
    const[,pre,word,post]=m;
    const r=correctWord(word,dict,rules);
    corrections.push(r);
    const isCap=/^[A-Z]/.test(word);
    correctedText+=pre+(isCap&&r.correct?r.correct[0].toUpperCase()+r.correct.slice(1):r.correct)+post;
  });
  const nb=corrections.filter(c=>!c.wasOk).length;
  let enc=nb===0?"Excellent ! Tu as très bien écrit tous les mots ! 🌟":
    nb<=2?`Très bien ! Seulement ${nb} mot(s) à corriger — tu progresses vraiment ! 👏`:
    "Bravo pour ton effort ! Regarde les corrections et réessaie — tu vas y arriver ! 💪";
  return{correctedText,corrections,encouragement:enc};
}

// ── RENDU ─────────────────────────────────────────────────────
function applyTheme(t){
  const c=THEMES[t]||THEMES.cream;
  const r=document.documentElement.style;
  r.setProperty("--bg",c.bg);
  r.setProperty("--text",c.text);
  r.setProperty("--accent",c.accent);
  r.setProperty("--paper",c.paper);
  r.setProperty("--accent-light",c.accent+"33");
  r.setProperty("--accent-bg",c.accent+"0D");
  r.setProperty("--accent-shadow",c.accent+"44");
  r.setProperty("--text-muted",c.text+"88");
  document.body.style.background=c.bg;
  document.body.style.color=c.text;
}

function el(tag,attrs,children){
  const e=document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class") e.className=v;
    else if(k==="style") Object.assign(e.style,v);
    else if(k.startsWith("on")) e.addEventListener(k.slice(2).toLowerCase(),v);
    else if(k==="disabled") { if(v) e.setAttribute("disabled",""); }
    else e.setAttribute(k,v);
  });
  if(children) [].concat(children).forEach(c=>{
    if(c==null) return;
    e.append(typeof c==="string"?document.createTextNode(c):c);
  });
  return e;
}
function div(attrs,children){return el("div",attrs,children);}
function span(attrs,children){return el("span",attrs,children);}
function btn(attrs,children){return el("button",attrs,children);}
function inp(attrs){return el("input",attrs);}
function txt(attrs,children){return el("textarea",attrs,children);}
function sel(attrs,options,current){
  const s=el("select",attrs);
  options.forEach(([v,l])=>{
    const o=el("option",{value:v});
    o.textContent=l;
    if(v===current) o.selected=true;
    s.appendChild(o);
  });
  return s;
}
function lbl(cls,text,child){
  const l=el("label",{class:cls});
  if(text) l.appendChild(document.createTextNode(text));
  if(child) l.appendChild(child);
  return l;
}

function buildCorrectedText(){
  if(!S.corrResult) return "";
  return S.corrResult.corrections.map((c,i)=>(S.chipOverrides[i]||c.correct)).join(" ");

function renderChip(c,idx,dict){
  const C=THEMES[S.theme];
  const override=S.chipOverrides[idx];
  const displayed=override||c.correct;
  const isOpen=S.openChip===idx;

  if(c.wasOk){
    const chip=div({class:"word-chip word-chip-ok"});
    chip.textContent="✅ "+c.original;
    return chip;
  }

  const conf=c.confidence||0;
  const method=c.method;
  const dotColor=method==="dict"?"#27ae60":method==="ai"?"#27ae60":conf>0.8?"#2980b9":conf>0.6?"#e67e22":"#e74c3c";
  const isOverridden=!!override;

  const chip=div({class:"word-chip",style:{background:isOverridden?"#27ae6015":`${dotColor}12`,borderColor:isOverridden?"#27ae6066":`${dotColor}55`,position:"relative"}});

  const orig=span({style:{color:"#c0392b",textDecoration:"underline",textDecorationStyle:"wavy",fontSize:"12px"}});
  orig.textContent=c.original;
  chip.appendChild(orig);
  chip.appendChild(span({style:{color:C.text+"44",margin:"0 5px"}},"→"));
  const corr=span({style:{color:isOverridden?"#27ae60":dotColor,fontWeight:"700"}});
  corr.textContent=displayed;
  chip.appendChild(corr);
  if(isOverridden) chip.appendChild(span({style:{fontSize:"9px",marginLeft:"4px",color:"#27ae60"}},"✏️"));
  chip.appendChild(span({class:"dot",style:{background:dotColor,marginLeft:"5px",opacity:".7"}}));
  chip.appendChild(span({style:{fontSize:"11px",marginLeft:"2px",color:C.text+"44"}},"▾"));

  chip.addEventListener("click",e=>{
    e.stopPropagation();
    S.openChip=isOpen?null:idx;
    S.chipCustom[idx]="";
    render();
  });

  if(isOpen){
    const popup=div({class:"chip-popup"});
    const ptitle=div({style:{fontSize:"11px",color:C.text+"77",marginBottom:"10px"}});
    ptitle.innerHTML=`<strong style="color:${C.accent}">"${c.original}"</strong> — ${method==="dict"?"Dictionnaire":method==="ai"?"IA Claude":method==="rules"?"Règles phonétiques":conf>0.8?"Bonne correspondance":conf>0.6?"Probable":"Incertain"}`;
    if(c.explanation){
      const exp=el("p",{style:{margin:"4px 0 0",fontSize:"11px",color:C.text+"88",fontStyle:"italic"}});
      exp.textContent=c.explanation;
      ptitle.appendChild(exp);
    }
    popup.appendChild(ptitle);
    if(c.suggestions&&c.suggestions.length>0){
      const sl=div({style:{marginBottom:"10px"}});
      const sltitle=div({style:{fontSize:"10px",fontWeight:"700",letterSpacing:".1em",color:C.text+"66",marginBottom:"6px"}});
      sltitle.textContent="SUGGESTIONS";
      sl.appendChild(sltitle);
      const sw=div({style:{display:"flex",flexWrap:"wrap",gap:"5px"}});
      c.suggestions.forEach(s=>{
        const sb=btn({style:{padding:"4px 10px",borderRadius:"8px",border:`1.5px solid ${C.accent}55`,background:s===displayed?`${C.accent}22`:"transparent",color:C.text,cursor:"pointer",fontSize:"12px",fontWeight:s===displayed?"700":"400",fontFamily:"Georgia,serif"},onClick:(e)=>{e.stopPropagation();S.chipOverrides[idx]=s;S.openChip=null;render();}});
        sb.textContent=s;
        sw.appendChild(sb);
      });
      sl.appendChild(sw);
      popup.appendChild(sl);
    }
    const customRow=div({style:{display:"flex",gap:"6px",marginBottom:"8px"}});
    const ci=inp({class:"inp",style:{flex:"1",padding:"5px 10px",fontSize:"12px"},placeholder:"Correction manuelle..."});
    ci.value=S.chipCustom[idx]||"";
    ci.addEventListener("input",e=>{S.chipCustom[idx]=e.target.value;});
    ci.addEventListener("click",e=>e.stopPropagation());
    ci.addEventListener("keydown",e=>{if(e.key==="Enter"&&ci.value.trim()){S.chipOverrides[idx]=ci.value.trim();S.openChip=null;render();}});
    customRow.appendChild(ci);
    customRow.appendChild(btn({style:{padding:"5px 10px",borderRadius:"7px",border:"none",background:C.accent,color:"#fff",cursor:"pointer",fontSize:"12px",fontFamily:"Georgia,serif"},onClick:(e)=>{e.stopPropagation();if((S.chipCustom[idx]||"").trim()){S.chipOverrides[idx]=S.chipCustom[idx].trim();S.openChip=null;render();}}},"✓"));
    popup.appendChild(customRow);
    const pbotrow=div({style:{display:"flex",gap:"6px"}});
    pbotrow.appendChild(btn({style:{flex:1,padding:"5px",borderRadius:"7px",border:`1px solid ${C.accent}44`,background:"transparent",color:C.accent,cursor:"pointer",fontSize:"11px",fontFamily:"Georgia,serif"},onClick:(e)=>{e.stopPropagation();speakText(displayed,"en-GB");}},"🔊 Écouter"));
    pbotrow.appendChild(btn({style:{padding:"5px 10px",borderRadius:"7px",border:`1px solid ${C.text}22`,background:"transparent",color:C.text+"66",cursor:"pointer",fontSize:"11px",fontFamily:"Georgia,serif"},onClick:(e)=>{e.stopPropagation();S.openChip=null;render();}},"✕"));
    popup.appendChild(pbotrow);
    chip.appendChild(popup);
    document.addEventListener("click",()=>{if(S.openChip===idx){S.openChip=null;render();}},{once:true});
  }
  return chip;
}

function prepareLearning(dict){
  const toLearn=[];
  S.corrResult.corrections.forEach((c,i)=>{
    if(c.wasOk) return;
    const correct=(S.chipOverrides[i]||c.correct).toLowerCase().trim();
    const original=c.original.toLowerCase().trim();
    if(original===correct) return;
    const alreadyKnown=dict[correct]&&dict[correct].toLowerCase()===original;
    if(!alreadyKnown) toLearn.push({phonetic:original,english:correct,source:S.chipOverrides[i]?"teacher":c.method});
  });
  S.corrPending=toLearn;
  S.corrShowValidation=true;
  S.corrPendingSelected=new Set(toLearn.map((_,i)=>i));
  render();
}

    function addWordEntry(){
      if(!S.newWordEn.trim()||!S.newWordFr.trim()) return;

    }
    const allEntries=[
      ...Object.entries(WORD_DICT).map(([en,fr])=>({en,fr,custom:false})),
      ...Object.entries(S.userDict).filter(([k])=>!WORD_DICT[k]).map(([en,fr])=>({en,fr,custom:true})),
    ].sort((a,b)=>a.en.localeCompare(b.en));
    const dgrid=div({style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:"6px"}});

        [eg,span({style:{color:C.text+"55"}},"→"),ef,eb].forEach(x=>row.appendChild(x));
      } else {
        row.appendChild(span({style:{fontFamily:"monospace",fontWeight:"700",color:custom?C.accent:C.text,fontSize:"14px",minWidth:"90px"}},en));
        row.appendChild(span({style:{color:C.text+"44",fontSize:"12px"}},"→"));

          btns_.appendChild(eb);btns_.appendChild(db);row.appendChild(btns_);

// ── UTILITAIRES ───────────────────────────────────────────────
function textStyle(){
  return{fontFamily:S.font,fontSize:`${S.fontSize}px`,lineHeight:S.lineH,letterSpacing:`${S.ltrSpc}em`,wordSpacing:`${S.wrdSpc}em`,color:THEMES[S.theme].text};
}

async function doCorrect(dict){
  if(!S.corrWriting.trim()) return;
  if(S.corrAiMode&&!S.rgpdOk){S.showRGPD=true;render();return;}
  S.corrLoading=true;S.corrResult=null;S.openChip=null;S.chipOverrides={};S.chipCustom={};
  render();
  if(!S.corrAiMode){
    await new Promise(r=>setTimeout(r,50)); // tick pour afficher le spinner
    const res=correctText(S.corrWriting,dict,S.rules);
    S.corrResult=res;S.corrLoading=false;render();
    return;
  }
  try{
    const local=correctText(S.corrWriting,dict,S.rules);
    const localHint=local.corrections.map(c=>`${c.original}→${c.correct}(${Math.round((c.confidence||0)*100)}%)`).join(", ");
    const resp=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:2000,
        messages:[{role:"user",content:
`Tu es un correcteur anglais expert pour élèves dyslexiques francophones.
L'élève a écrit (phonétique francisée) : "${S.corrWriting}"
Moteur local suggère : ${localHint}

Règles : sh→ch, th→s, igh→aï, oo→ou, ee→ii, ay→é, er/ir/ur→eur, ou→aou, ow→o

Réponds UNIQUEMENT en JSON sans markdown :
{"correctedText":"...","encouragement":"message bienveillant français","corrections":[{"original":"mot","correct":"correction","wasOk":false,"confidence":"high","explanation":"court pourquoi","suggestions":["alt1","alt2"]}]}`
        }]
      })
    });
    const d=await resp.json();
    const txt=d.content?d.content.map(c=>c.text).join(""):"";
    const parsed=JSON.parse(txt.replace(/```json|```/g,"").trim());
    parsed.corrections=parsed.corrections.map(c=>({...c,confidence:c.confidence==="high"?.95:c.confidence==="medium"?.7:.45,method:"ai"}));
    S.corrResult=parsed;
  }catch(e){
    const res=correctText(S.corrWriting,dict,S.rules);
    S.corrResult=res;
  }
  S.corrLoading=false;render();
}

function speakText(text, lang){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel(); S.curWord=-1;
  const u=new SpeechSynthesisUtterance(text);
  if(S.selVoice) u.voice=S.selVoice;
  u.rate=S.rate;u.pitch=S.pitch;u.volume=S.vol;
  u.lang=lang||"fr-FR";
  u.onstart=()=>{S.speaking=true;};
  u.onend=()=>{S.speaking=false;};
  window.speechSynthesis.speak(u);
}
function speakWord(w){
  if(!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(w);
  if(S.selVoice) u.voice=S.selVoice;
  u.rate=S.rate*.75;u.pitch=S.pitch;u.volume=S.vol;
  u.lang=S.oralSrc==="original"?"en-GB":"fr-FR";
  window.speechSynthesis.speak(u);
}

// ── BOOT ─────────────────────────────────────────────────────
loadState();
// Voix
if(window.speechSynthesis){
  const loadVoices=()=>{
    const all=window.speechSynthesis.getVoices();
    const list=[...all.filter(v=>v.lang.startsWith("fr")),...all.filter(v=>v.lang.startsWith("en"))];
    if(list.length>0&&!S.selVoice){S.selVoice=list[0];}
    S.voices=list;
    render();
  };
  loadVoices();
  window.speechSynthesis.onvoiceschanged=loadVoices;
}
render();
